<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | LegalSeal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body style="height: 100vh; display: flex; flex-direction: column; background: linear-gradient(rgba(10,10,10,0.8), rgba(10,10,10,0.8)), url('https://images.unsplash.com/photo-1589829085413-56de8ae18c73?auto=format&fit=crop&w=2000&q=80') center/cover;">

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
    <div style="background-color: var(--color-secondary); padding: 4rem; border-radius: var(--radius-global); max-width: 600px; box-shadow: var(--shadow-global);">
      <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 2rem; font-size: 2rem;">
        <i data-lucide="scale" style="width: 2rem; height: 2rem;"></i> LegalSeal
      </a>
      
      <h1 style="margin-bottom: 1.5rem; font-size: 2.5rem;">Launching Soon</h1>
      <p style="color: var(--color-text-muted); font-size: 1.125rem; margin-bottom: 3rem;">
        Our new digital portal for expedited notarization and apostille services is almost ready.
      </p>

      <!-- Countdown Visual -->
      <div class="flex justify-center gap-4" style="margin-bottom: 3rem;">
        <div style="text-align: center;">
          <div style="font-size: 2.5rem; font-family: var(--font-heading); font-weight: bold; color: var(--color-primary);">14</div>
          <div style="font-size: 0.875rem; color: var(--color-text-muted); text-transform: uppercase;">Days</div>
        </div>
        <div style="font-size: 2.5rem; font-family: var(--font-heading); font-weight: bold; color: var(--color-border);">:</div>
        <div style="text-align: center;">
          <div style="font-size: 2.5rem; font-family: var(--font-heading); font-weight: bold; color: var(--color-primary);">08</div>
          <div style="font-size: 0.875rem; color: var(--color-text-muted); text-transform: uppercase;">Hours</div>
        </div>
        <div style="font-size: 2.5rem; font-family: var(--font-heading); font-weight: bold; color: var(--color-border);">:</div>
        <div style="text-align: center;">
          <div style="font-size: 2.5rem; font-family: var(--font-heading); font-weight: bold; color: var(--color-primary);">45</div>
          <div style="font-size: 0.875rem; color: var(--color-text-muted); text-transform: uppercase;">Mins</div>
        </div>
      </div>

      <form class="needs-validation" novalidate>
        <div class="flex gap-2">
          <input type="email" class="form-control" required placeholder="Enter your email to get notified">
          <button type="submit" class="btn btn-primary" style="white-space: nowrap;">Notify Me</button>
        </div>
      </form>
    </div>
  </main>

  <script>lucide.createIcons();</script>
  <script src="assets/js/main.js"></script>
</body>
</html>
