<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LegalSeal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body style="height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background-color: var(--color-surface-alt);">
  
  <div style="width: 100%; max-width: 450px; padding: 2rem;">

    <div style="background-color: var(--color-secondary); padding: 2.5rem; border-radius: var(--radius-global); box-shadow: var(--shadow-global); border: 1px solid var(--color-border);">
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="justify-content: center;"><i data-lucide="scale"></i> LegalSeal</a>
        <h2 style="margin-top: 1.5rem; font-size: 1.75rem;">Welcome Back</h2>
        <p style="color: var(--color-text-muted); font-size: 0.9375rem;">Sign in to access your dashboard</p>
      </div>

      <form action="#" method="POST" class="needs-validation" novalidate>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="name@company.com">
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
          <label class="form-label flex justify-between">
            <span>Password</span>
            <a href="#" style="color: var(--color-primary); font-size: 0.875rem;">Forgot?</a>
          </label>
          <input type="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary btn-full" style="margin-bottom: 1.5rem;">Login</button>
        
        <div style="position: relative; text-align: center; margin-bottom: 1.5rem;">
          <hr style="border: none; border-top: 1px solid var(--color-border);">
          <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--color-secondary); padding: 0 0.5rem; color: var(--color-text-muted); font-size: 0.875rem;">or continue with</span>
        </div>

        <div class="flex flex-col gap-3">
          <button type="button" class="btn" style="background-color: #fff; color: #333; border: 1px solid #ddd; width: 100%;">
            <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" style="margin-right: 0.5rem;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
          <button type="button" class="btn btn-outline btn-full">
            <i data-lucide="mail"></i> Continue with Email
          </button>
        </div>
      </form>

      <p style="text-align: center; margin-top: 2rem; color: var(--color-text-muted); font-size: 0.9375rem; border-top: 1px solid var(--color-border); padding-top: 1.5rem; margin-bottom: 0;">
        Don't have an account? <a href="register.html" style="color: var(--color-primary); font-weight: 500;">Register here</a>
      </p>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script src="assets/js/main.js"></script>
</body>
</html>
